    const html=new TextDecoder().decode(all);
    document.open('text/html','replace');
    document.write(html);
    document.close();
  }catch(e){
    document.body.innerHTML='<div style="color:#C62828;padding:40px;text-align:center">'
      +'<h2>&#9888;&#65039; Load Error</h2><p>'+e.message+'</p>'
      +'<p style="font-size:.8rem;opacity:.6">Requires Chrome 80+, Edge 80+, or Firefox 113+</p></div>';
  }
})();
</script></body></html>
